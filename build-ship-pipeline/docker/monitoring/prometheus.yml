global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # Pipeline agent-plane metrics (pushed via OTLP, re-exposed by collector)
  - job_name: build-ship-pipeline
    static_configs:
      - targets: ["otel-collector:8889"]

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
