name: Frontend

on:
  push:
    branches: ["**"]
    paths:
      - "build-ship-pipeline/ui/frontend/**"
  pull_request:
    branches: ["**"]
    paths:
      - "build-ship-pipeline/ui/frontend/**"

jobs:
  build:
    name: TypeScript + Vite build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: build-ship-pipeline/ui/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: build-ship-pipeline/ui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build
