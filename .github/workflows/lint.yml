name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: build-ship-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Lint (errors + undefined names)
        run: ruff check src/ tests/ ui/backend/

      - name: Format check
        run: ruff format --check src/ tests/ ui/backend/
